name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd /opt/votedots/app
            docker compose -f docker-compose.prod.yml down
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml build backend nginx
            docker compose -f docker-compose.prod.yml up -d redis
            docker compose -f docker-compose.prod.yml run --rm backend npm run migration:run
            docker compose -f docker-compose.prod.yml up -d --remove-orphans backend nginx redis
            docker compose -f docker-compose.prod.yml exec -T backend node -e "fetch('http://127.0.0.1:4000/health').then(async (res) => { if (!res.ok) process.exit(1); console.log(await res.text()); }).catch((error) => { console.error(error); process.exit(1); })"
