services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: votedots_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d votedots_test"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis-test:
    image: redis:${REDIS_VERSION}-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_test_data:/data

volumes:
  postgres_test_data:
  redis_test_data:
